name: GRM API Intake (Weekly)

# 매주 일요일 20:17 UTC = 월요일 05:17 KST
# Claude Code Routine (월 07:30 KST) 2시간 전에 수집 완료 목표
# (GitHub Actions cron 최대 60분 지연 공식 고지 → 여유 2시간 확보)
# 비정각(:17) 사용 — GitHub Actions :00 부하 분산 권장사항 반영
#
# cron 표기:
# minute hour day(month) month day(week)
#  17     20    *           *      0       → 일요일 20:17 UTC
on:
  schedule:
    - cron: '17 20 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (Notion 호출 없이 stdout 만 출력)'
        type: boolean
        default: false
      window_days:
        description: '수집 윈도우 일수 (기본 7)'
        type: string
        default: '7'

permissions:
  contents: read
  issues: write  # 실패 시 자동 이슈 생성용

concurrency:
  group: grm-intake
  cancel-in-progress: false

jobs:
  collect:
    name: Collect FR + OpenFDA → Notion Intake
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Show run context (KST)
        run: |
          echo "UTC now : $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "KST now : $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M:%S')"

      - name: Run collector
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          OPENFDA_API_KEY: ${{ secrets.OPENFDA_API_KEY }}
          # workflow_dispatch 입력을 env 변수로만 받아 shell 본문에 직접 삽입 금지
          GRM_DRY_RUN: ${{ inputs.dry_run }}
          GRM_WINDOW_DAYS: ${{ inputs.window_days }}
          # github.event_name을 env로 노출 — shell 본문 ${{ }} 직접 삽입 방지 (W2)
          GRM_EVENT_NAME: ${{ github.event_name }}
        run: |
          # bash array 방식 — 인자를 문자열 연결하지 않아 quoting/injection 문제 없음
          args=()
          if [ "$GRM_EVENT_NAME" = "workflow_dispatch" ]; then
            if [ "$GRM_DRY_RUN" = "true" ]; then args+=(--dry-run); fi

            # W1: 범위 검증 — 비정수 입력 시 경고 후 기본값 7; 범위(1-90) 초과 시 exit 1
            if printf '%s' "$GRM_WINDOW_DAYS" | grep -qE '^[0-9]+$'; then
              WINDOW_DAYS_VAL="$GRM_WINDOW_DAYS"
            else
              echo "::warning ::window_days '$GRM_WINDOW_DAYS' is not an integer — using default 7"
              WINDOW_DAYS_VAL="7"
            fi
            if (( WINDOW_DAYS_VAL < 1 || WINDOW_DAYS_VAL > 90 )); then
              echo "::error ::window_days=$WINDOW_DAYS_VAL out of range [1, 90]"
              exit 1
            fi
            args+=(--window-days "$WINDOW_DAYS_VAL")
          fi
          python collect_intake.py "${args[@]}"

      - name: Open issue on failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const today = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `GRM Intake 실패 — ${today}`,
              body: [
                '주간 GRM API Intake 수집기가 실패했습니다.',
                '',
                `- Run: ${runUrl}`,
                `- Trigger: ${context.eventName}`,
                '',
                '점검 항목:',
                '1. Notion Integration 토큰 유효성',
                '2. Notion DB 스키마 (속성 이름·타입)',
                '3. Federal Register / OpenFDA API 상태',
                '4. GitHub Secrets 값',
                '',
                '실패해도 Claude Routine 은 v14.5 WebSearch-only 모드로 graceful degradation 됩니다.',
              ].join('\n'),
              labels: ['grm-intake', 'automation-failure'],
            });
