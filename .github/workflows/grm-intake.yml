name: GRM API Intake (Daily)

# 매일 20:17 UTC = 익일 05:17 KST
# Claude Routine (매주 월 07:30 KST) 전에 7일치 수집 완료 보장
# (GitHub Actions cron 최대 60분 지연 공식 고지)
# 비정각(:17) 사용 — GitHub Actions :00 부하 분산 권장사항 반영
#
# cron 표기:
# minute hour day(month) month day(week)
#  17     20    *           *      *       → 매일 20:17 UTC
on:
  schedule:
    - cron: '17 20 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (Notion 호출 없이 stdout 만 출력)'
        type: boolean
        default: false
      window_days:
        description: '수집 윈도우 일수 (기본 7)'
        type: string
        default: '7'
      sources:
        description: '수집 소스 제한(공백/쉼표 구분: fr recall ema mhra pics eca wl). 비우면 전체'
        type: string
        default: ''
      enable_search:
        description: 'Brave Search 수집 활성화 (기본: vars.ENABLE_SEARCH 또는 false)'
        type: boolean
        default: false
      enable_mfds:
        description: 'MFDS 수집 활성화 (기본: vars.ENABLE_MFDS 또는 true)'
        type: boolean
        default: true
      enable_mfds_recall:
        description: 'MFDS 회수·판매중지 API 수집 활성화 (기본: vars.ENABLE_MFDS_RECALL 또는 true)'
        type: boolean
        default: true
      enable_moleg_api:
        description: '법제처 ogLmPp API opt-in (기본: vars.ENABLE_MOLEG_API 또는 false)'
        type: boolean
        default: false
      enable_scrape:
        description: 'Web Scrape 수집 활성화 (기본: vars.ENABLE_SCRAPE 또는 false)'
        type: boolean
        default: false

permissions:
  contents: read
  issues: write  # 실패 시 자동 이슈 생성용

concurrency:
  group: grm-intake
  cancel-in-progress: false

jobs:
  collect:
    name: Collect sources → Notion Intake
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Show run context (KST)
        run: |
          echo "UTC now : $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "KST now : $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M:%S')"

      - name: Run collector
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          OPENFDA_API_KEY: ${{ secrets.OPENFDA_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
          DATA_GO_KR_SERVICE_KEY: ${{ secrets.DATA_GO_KR_SERVICE_KEY }}
          # workflow_dispatch 입력을 env 변수로만 받아 shell 본문에 직접 삽입 금지
          GRM_DRY_RUN: ${{ inputs.dry_run }}
          GRM_WINDOW_DAYS: ${{ inputs.window_days }}
          GRM_SOURCES: ${{ inputs.sources }}
          # github.event_name을 env로 노출 — shell 본문 ${{ }} 직접 삽입 방지 (W2)
          GRM_EVENT_NAME: ${{ github.event_name }}
          # Phase 2a feature flags:
          # workflow_dispatch: (event_name == 'workflow_dispatch') && format('{0}', inputs.*) 로
          #   boolean false를 "false" 문자열(non-empty=truthy)로 변환 후 short-circuit
          #   → 사용자가 명시적으로 false 설정 시 vars.ENABLE_* 로 override되는 버그 방지
          # schedule: event_name != 'workflow_dispatch' → false → vars.* || 'false' fallback
          ENABLE_SEARCH: ${{ (github.event_name == 'workflow_dispatch') && format('{0}', inputs.enable_search) || vars.ENABLE_SEARCH || 'false' }}
          ENABLE_MFDS: ${{ (github.event_name == 'workflow_dispatch') && format('{0}', inputs.enable_mfds) || vars.ENABLE_MFDS || 'true' }}
          ENABLE_MFDS_RECALL: ${{ (github.event_name == 'workflow_dispatch') && format('{0}', inputs.enable_mfds_recall) || vars.ENABLE_MFDS_RECALL || 'true' }}
          ENABLE_MOLEG_API: ${{ (github.event_name == 'workflow_dispatch') && format('{0}', inputs.enable_moleg_api) || vars.ENABLE_MOLEG_API || 'false' }}
          ENABLE_SCRAPE: ${{ (github.event_name == 'workflow_dispatch') && format('{0}', inputs.enable_scrape) || vars.ENABLE_SCRAPE || 'false' }}
        run: |
          if [ "$GRM_EVENT_NAME" = "workflow_dispatch" ] && [ "$GRM_SOURCES" = "__probe_admin_gmpcert__" ]; then
            if [ -z "$DATA_GO_KR_SERVICE_KEY" ]; then
              echo "::error ::DATA_GO_KR_SERVICE_KEY secret is missing"
              exit 1
            fi
            status=0
            python probe_datago.py \
              "https://apis.data.go.kr/1471000/MdcinExaathrService04" \
              "getMdcinExaathrList04,getMdcinExaathrList,getMdcinExaathrInq04" || status=$?
            python probe_datago.py \
              "http://apis.data.go.kr/1471000/DrugGmpStbltJgmtIssuStusService" \
              "getDrugGmpStbltJgmtIssuStusInq,getDrugGmpStbltJgmtIssuStusList,getDrugGmpStbltJgmtIssuStusInq04" || status=$?
            exit "$status"
          fi

          # bash array 방식 — 인자를 문자열 연결하지 않아 quoting/injection 문제 없음
          args=()
          if [ "$GRM_EVENT_NAME" = "workflow_dispatch" ]; then
            if [ "$GRM_DRY_RUN" = "true" ]; then args+=(--dry-run); fi

            # W1: 범위 검증 — 비정수 입력 시 경고 후 기본값 7; 범위(1-90) 초과 시 exit 1
            if printf '%s' "$GRM_WINDOW_DAYS" | grep -qE '^[0-9]+$'; then
              WINDOW_DAYS_VAL="$GRM_WINDOW_DAYS"
            else
              echo "::warning ::window_days is not an integer — using default 7"
              WINDOW_DAYS_VAL="7"
            fi
            if (( WINDOW_DAYS_VAL < 1 || WINDOW_DAYS_VAL > 90 )); then
              echo "::error ::window_days=$WINDOW_DAYS_VAL out of range [1, 90]"
              exit 1
            fi
            args+=(--window-days "$WINDOW_DAYS_VAL")

            if [ -n "$GRM_SOURCES" ]; then
              # 쉼표도 공백으로 처리. 허용된 source 토큰만 --sources 인자로 전달.
              read -r -a SOURCE_TOKENS <<< "$(printf '%s' "$GRM_SOURCES" | tr ',' ' ')"
              valid_sources=(fr recall ema mhra pics eca wl)
              source_args=()
              for src in "${SOURCE_TOKENS[@]}"; do
                ok=false
                for valid in "${valid_sources[@]}"; do
                  if [ "$src" = "$valid" ]; then ok=true; break; fi
                done
                if [ "$ok" != "true" ]; then
                  echo "::error ::invalid source token"
                  exit 1
                fi
                source_args+=("$src")
              done
              if [ "${#source_args[@]}" -gt 0 ]; then
                args+=(--sources "${source_args[@]}")
              fi
            fi
          fi
          python collect_intake.py "${args[@]}"

      - name: Open issue on failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v9.0.0
        with:
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const today = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `GRM Intake 실패 — ${today}`,
              body: [
                'GRM API Intake 수집기(Daily)가 실패했습니다.',
                '',
                `- Run: ${runUrl}`,
                `- Trigger: ${context.eventName}`,
                '',
                '점검 항목:',
                '1. Notion Integration 토큰 유효성',
                '2. Notion DB 스키마 (속성 이름·타입)',
                '3. Federal Register / OpenFDA / RSS / FDA WL 상태',
                '4. GitHub Secrets 값 (NOTION_TOKEN, OPENFDA_API_KEY, BRAVE_API_KEY, DATA_GO_KR_SERVICE_KEY)',
                '5. Repository Variables (ENABLE_SEARCH, ENABLE_MFDS, ENABLE_MFDS_RECALL, ENABLE_MOLEG_API, ENABLE_SCRAPE) 설정 확인',
                '6. MFDS 활성화 시 RSS/API 상태 확인; ENABLE_MOLEG_API=true인 경우 DATA_GO_KR_KEY/OC/IP 인가 확인',
                '',
                '실패해도 Claude Routine 은 v14.5 WebSearch-only 모드로 graceful degradation 됩니다.',
              ].join('\n'),
              labels: ['grm-intake', 'automation-failure'],
            });
