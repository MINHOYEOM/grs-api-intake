name: GRS API Intake (Weekly)

# 매주 일요일 22:00 UTC = 월요일 07:00 KST
# Claude Code Routine (월 07:30 KST) 30분 전에 수집 완료
#
# cron 표기:
# minute hour day(month) month day(week)
#  0      22    *           *      0       → 일요일 22:00 UTC
on:
  schedule:
    - cron: '0 22 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (Notion 호출 없이 stdout 만 출력)'
        type: boolean
        default: false
      window_days:
        description: '수집 윈도우 일수 (기본 7)'
        type: string
        default: '7'

permissions:
  contents: read
  issues: write  # 실패 시 자동 이슈 생성용

concurrency:
  group: grs-intake
  cancel-in-progress: false

jobs:
  collect:
    name: Collect FR + OpenFDA → Notion Intake
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Show run context (KST)
        run: |
          echo "UTC now : $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "KST now : $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M:%S')"

      - name: Run collector
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          OPENFDA_API_KEY: ${{ secrets.OPENFDA_API_KEY }}
        run: |
          ARGS=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
            if [ -n "${{ inputs.window_days }}" ]; then ARGS="$ARGS --window-days ${{ inputs.window_days }}"; fi
          fi
          python collect_intake.py $ARGS

      - name: Open issue on failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const today = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `GRS Intake 실패 — ${today}`,
              body: [
                '주간 GRS API Intake 수집기가 실패했습니다.',
                '',
                `- Run: ${runUrl}`,
                `- Trigger: ${context.eventName}`,
                '',
                '점검 항목:',
                '1. Notion Integration 토큰 유효성',
                '2. Notion DB 스키마 (속성 이름·타입)',
                '3. Federal Register / OpenFDA API 상태',
                '4. GitHub Secrets 값',
                '',
                '실패해도 Claude Routine 은 v14.5 WebSearch-only 모드로 graceful degradation 됩니다.',
              ].join('\n'),
              labels: ['grs-intake', 'automation-failure'],
            });
