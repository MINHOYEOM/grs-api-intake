name: GRS API Intake (Weekly)

# Cron schedule rationale (post-Codex review):
#   '7 22 * * 0' = Sunday 22:07 UTC = Monday 07:07 KST
#   Non-zero minute reduces queueing delay/drop risk (GitHub Actions docs note
#   top-of-hour schedules are higher-contention). The downstream Claude Routine
#   still has its ~23-minute buffer before Monday 07:30 KST.
on:
  schedule:
    - cron: '7 22 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (Notion 호출 없이 stdout 만 출력)'
        type: boolean
        default: false
      window_days:
        description: '수집 윈도우 일수 (기본 7)'
        type: string
        default: '7'

permissions:
  contents: read
  issues: write  # 실패 시 자동 이슈 생성용

concurrency:
  group: grs-intake
  cancel-in-progress: false

jobs:
  collect:
    name: Collect FR + OpenFDA → Notion Intake
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Show run context (KST)
        run: |
          echo "UTC now : $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "KST now : $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M:%S')"

      - name: Run collector
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          OPENFDA_API_KEY: ${{ secrets.OPENFDA_API_KEY }}
          # Codex review (should-fix #4): move workflow_dispatch inputs into env
          # vars instead of interpolating them directly into the shell command.
          # Combined with the digit-only regex validation below, this prevents
          # any user-controlled input from being interpreted as shell syntax.
          EVENT_NAME: ${{ github.event_name }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
          INPUT_WINDOW_DAYS: ${{ inputs.window_days }}
          # Codex Q1: defensive PYTHONIOENCODING for any non-ASCII Notion output
          # in the action log (nice-to-have, free on ubuntu-latest).
          PYTHONIOENCODING: utf-8
        run: |
          set -euo pipefail
          ARGS=""
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            if [ "${INPUT_DRY_RUN}" = "true" ]; then
              ARGS="$ARGS --dry-run"
            fi
            if [ -n "${INPUT_WINDOW_DAYS:-}" ]; then
              # Defense-in-depth: only allow positive integers (not zero).
              # Codex Pass 3: '^[0-9]+$' allowed 0, which yields an empty window.
              if ! [[ "${INPUT_WINDOW_DAYS}" =~ ^[1-9][0-9]*$ ]]; then
                echo "ERROR: window_days must be a positive integer >= 1 (got '${INPUT_WINDOW_DAYS}')" >&2
                exit 1
              fi
              ARGS="$ARGS --window-days ${INPUT_WINDOW_DAYS}"
            fi
          fi
          python collect_intake.py $ARGS

      - name: Open issue on failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            // Codex should-fix #7: project rule is KST dates, not UTC.
            //   KST = UTC + 9 hours
            const kstNow = new Date(Date.now() + 9 * 60 * 60 * 1000);
            const kstDate = kstNow.toISOString().slice(0, 10);
            const runNumber = context.runNumber;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `GRS Intake failure - ${kstDate} KST - run #${runNumber}`,
              body: [
                '주간 GRS API Intake 수집기가 실패했습니다.',
                '',
                `- Run: ${runUrl}`,
                `- Run number: #${runNumber}`,
                `- Date (KST): ${kstDate}`,
                `- Trigger: ${context.eventName}`,
                '',
                '점검 항목:',
                '1. Notion Integration 토큰 유효성',
                '2. Notion DB 스키마 (속성 이름·타입)',
                '3. Federal Register / OpenFDA API 상태',
                '4. GitHub Secrets 값',
                '',
                '실패해도 Claude Routine 은 v14.5 WebSearch-only 모드로 graceful degradation 됩니다.',
              ].join('\n'),
              labels: ['grs-intake', 'automation-failure'],
            });
